apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment

metadata:
  name: flink-transformation-v2
  namespace: flink

spec:

  image: ghcr.io/alexriley7/streaming-system/shadow-flink-transformation:909a83dcb9e87d9823106bc05ecc2b9ef7c4c96a

  flinkVersion: v1_18

  serviceAccount: flink-sa

  # ==========================================================
  # JOB MANAGER
  # ==========================================================

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  # ==========================================================
  # TASK MANAGER
  # ==========================================================

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  # ==========================================================
  # FLINK CONFIGURATION
  # ==========================================================

  flinkConfiguration:

    taskmanager.numberOfTaskSlots: "1"

    # --------------------------------------------------------
    # STATE BACKEND
    # --------------------------------------------------------

    state.backend: hashmap

    # --------------------------------------------------------
    # CHECKPOINTS / SAVEPOINTS
    # --------------------------------------------------------

    execution.checkpointing.interval: "30s"

    state.checkpoints.dir: file:///data/flink-checkpoints/checkpoints-shadow/debug/a3

    state.savepoints.dir: file:///data/flink-checkpoints/savepoints-shadow/debug/a3

    state.checkpoints.num-retained: "5"

    # --------------------------------------------------------
    # S3 / MOTO
    # --------------------------------------------------------

    s3.endpoint: http://moto-s3.default.svc.cluster.local:5000

    s3.path.style.access: "true"

    s3.access-key: test

    s3.secret-key: test

    s3.connection.ssl.enabled: "false"

  # ==========================================================
  # FLINK JOB
  # ==========================================================

  job:

    jarURI: local:///opt/flink/usrlib/job.jar

    entryClass: com.example.ShadowFlinkTransformationJob

    parallelism: 1

    upgradeMode: stateless

    state: running

    savepointTriggerNonce: 2

  # ==========================================================
  # POD TEMPLATE
  # ==========================================================

  podTemplate:

    spec:

      containers:

        - name: flink-main-container

          env:

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: shadow-flink-debug-a3-v1

            - name: ENABLE_JOB
              value: "true"

            - name: OUTPUT_TOPIC
              value: "shadow-output-topic-debug-a3"

          # --------------------------------------------------
          # MOUNT CHECKPOINT STORAGE
          # --------------------------------------------------

          volumeMounts:

            - name: flink-checkpoints-volume
              mountPath: /data/flink-checkpoints

      # ------------------------------------------------------
      # PVC VOLUME
      # ------------------------------------------------------

      volumes:

        - name: flink-checkpoints-volume

          persistentVolumeClaim:
            claimName: flink-checkpoints-pvc