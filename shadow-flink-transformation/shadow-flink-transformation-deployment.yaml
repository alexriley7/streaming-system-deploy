apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-transformation-v2
  namespace: flink
spec:
  image: ghcr.io/alexriley7/streaming-system/shadow-flink-transformation:1bdfbba23ece937a5495e50061cbbe882d77592f
  flinkVersion: v1_18
  serviceAccount: flink-sa

  jobManager:
    resource:
      cpu: 0.5
      memory: "1024m"

  taskManager:
    resource:
      cpu: 0.5
      memory: "1024m"

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"

  job:
    jarURI: local:///opt/flink/usrlib/job.jar
    entryClass: com.example.ShadowFlinkTransformationJob   # 👈 ADD THIS
    parallelism: 1
    upgradeMode: stateless
    state: running

  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v2