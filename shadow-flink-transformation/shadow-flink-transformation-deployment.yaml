apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-transformation-v2
  namespace: flink
spec:
  image: ghcr.io/alexriley7/streaming-system/shadow-flink-transformation:805e2809c6d25bfd20d371eb433fe7168e4a0eb1
  flinkVersion: v1_18
  serviceAccount: flink-sa

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"
    s3.endpoint: http://moto-s3.default.svc.cluster.local:5000
    s3.path.style.access: "true"
    s3.access-key: test
    s3.secret-key: test

  job:
    jarURI: local:///opt/flink/usrlib/job.jar
    entryClass: com.example.ShadowFlinkTransformationJob   # 👈 ADD THIS#
    parallelism: 1
    upgradeMode: stateless
    state: running

  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v2

            - name: ENABLE_JOB
              value: "true"   #### switch to "false" to stop producing # offsets didn't changed

            - name: OUTPUT_TOPIC
              value: "shadow-output-topic"