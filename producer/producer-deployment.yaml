apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: ghcr.io/alexriley7/streaming-system/producer:0fb1bd601f4a30b0898a7e0ab16f6ad2e7e05461
          imagePullPolicy: Always

          # Added: 

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: ENABLE_PRODUCER
              value: "false"   # switch to "false" to stop producing

            - name: TOPIC
              value: input-topic-debug-a4


      imagePullSecrets:
        - name: ghcr-secret