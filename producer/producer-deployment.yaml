apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 0
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: ghcr.io/alexriley7/producer:latest
          imagePullPolicy: Always

          # Added:

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
            - name: TOPIC
              value: input-topic


      imagePullSecrets:
        - name: ghcr-secret