apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: ghcr.io/alexriley7/streaming-system/producer:1e2e56c13b9d83a822f52929e922a2a9afe7b98c
          imagePullPolicy: Always

          # Added:

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: ENABLE_PRODUCER
              value: "true"   # switch to "false" to stop producing

            - name: TOPIC
              value: input-topic


      imagePullSecrets:
        - name: ghcr-secret