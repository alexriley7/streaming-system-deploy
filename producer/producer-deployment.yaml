apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: ghcr.io/alexriley7/streaming-system/producer:a6ac1ac1f11de7eb3730540b536c7311fdc68cf8
          imagePullPolicy: Always

          # Added:

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: ENABLE_PRODUCER
              value: "true"   # switch to "false" to stop producing

            - name: TOPIC
              value: input-topic


      imagePullSecrets:
        - name: ghcr-secret