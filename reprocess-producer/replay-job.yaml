apiVersion: batch/v1
kind: Job
metadata:
  name: replay-job-a4
  namespace: kafka

spec:
  backoffLimit: 0

  template:
    metadata:
      labels:
        app: replay-job-a4

    spec:
      restartPolicy: Never

      containers:
      - name: replay

        image: reprocess-producer:2.0.0
        imagePullPolicy: Never

        env:
        - name: BOOTSTRAP_SERVERS
          value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

        - name: S3_ENDPOINT
          value: http://moto-s3.default.svc.cluster.local:5000

        - name: S3_BUCKET
          value: events