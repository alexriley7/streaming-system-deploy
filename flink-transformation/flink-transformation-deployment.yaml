apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-transformation-v1
  namespace: flink
spec:
  image: ghcr.io/alexriley7/streaming-system/flink-transformation:5a4ccea63e038dfe09d855d78c0874b4caf7d044
  flinkVersion: v1_18
  serviceAccount: flink-sa

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"

  job:
    jarURI: local:///opt/flink/usrlib/job.jar
    entryClass: com.example.FlinkTransformationJob   # 👈 ADD THIS#
    parallelism: 1
    upgradeMode: stateless 
    state: running

  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v1

            - name: ENABLE_JOB
              value: "true"   # switch to "false" to stop producing #offsets were set to lasted

            - name: OUTPUT_TOPIC
              value: "output-topic-v1"


  flinkConfiguration:

    state.checkpoints.dir: s3://flink-checkpoints/checkpoints

    state.savepoints.dir: s3://flink-savepoints/savepoints

    s3.endpoint: http://minio.flink.svc.cluster.local:9000

    s3.path.style.access: true

    s3.access-key: minio

    s3.secret-key: minio123

    fs.s3a.endpoint: minio.flink.svc.cluster.local:9000

    fs.s3a.path.style.access: true

    fs.s3a.access.key: minio

    fs.s3a.secret.key: minio123

    fs.s3a.connection.ssl.enabled: false