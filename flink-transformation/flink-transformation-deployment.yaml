apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-transformation-v1
  namespace: flink
spec:
  image: ghcr.io/alexriley7/streaming-system/flink-transformation:b9e5d5aa1d52f3f6953c24044d52e0c20391b80d
  flinkVersion: v1_18
  serviceAccount: flink-sa

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"

  job:
    jarURI: local:///opt/flink/usrlib/job.jar
    entryClass: com.example.FlinkTransformationJob   # 👈 ADD THIS#
    parallelism: 1
    upgradeMode: stateless 
    state: running

  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v1

            - name: ENABLE_JOB
              value: "true"   # switch to "false" to stop producing #offsets were set to lasted

            - name: OUTPUT_TOPIC
              value: "output-topic-v1"


  flinkConfiguration:

    state.backend: hashmap

    state.checkpoints.dir: s3://flink-checkpoints/checkpoints
    state.savepoints.dir: s3://flink-savepoints/savepoints

    execution.checkpointing.interval: 10s

    s3.endpoint: http://moto-s3.default.svc.cluster.local:5000
    s3.path.style.access: "true"

    s3.access-key: test
    s3.secret-key: test

    s3.connection.ssl.enabled: "false"