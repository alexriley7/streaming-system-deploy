apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-transformation-v1
  namespace: flink
spec:
  image: ghcr.io/alexriley7/streaming-system/flink-transformation:71825a977775aeaf3d77334e6b97d6adacc76c58
  flinkVersion: v1_18
  serviceAccount: flink-sa

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"

  job:
    jarURI: local:///opt/flink/usrlib/job.jar
    entryClass: com.example.FlinkTransformationJob   # 👈 ADD THIS#
    parallelism: 1
    upgradeMode: stateless 
    state: running

  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v1

            - name: ENABLE_JOB
              value: "true"   # switch to "false" to stop producing #offsets were set to lasted

            - name: OUTPUT_TOPIC
              value: "output-topic-v1"