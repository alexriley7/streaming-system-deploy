apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment

metadata:
  name: flink-transformation-v1
  namespace: flink

spec:

  image: ghcr.io/alexriley7/streaming-system/flink-transformation:9753550f6254909f41e728a905f934cb5b150c39

  flinkVersion: v1_18

  serviceAccount: flink-sa

  # ==========================================================
  # JOB MANAGER
  # ==========================================================

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  # ==========================================================
  # TASK MANAGER
  # ==========================================================

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  # ==========================================================
  # FLINK CONFIGURATION
  # ==========================================================

  flinkConfiguration:

    taskmanager.numberOfTaskSlots: "1"

    # --------------------------------------------------------
    # CHECKPOINTS / SAVEPOINTS
    # --------------------------------------------------------

    execution.checkpointing.interval: "30s"

    state.checkpoints.dir: file:///data/flink-checkpoints/checkpoints

    state.savepoints.dir: file:///data/flink-checkpoints/savepoints

    # OPTIONAL:
    # keep checkpoint history

    state.checkpoints.num-retained: "5"

  # ==========================================================
  # FLINK JOB
  # ==========================================================

  job:

    jarURI: local:///opt/flink/usrlib/job.jar

    entryClass: com.example.FlinkTransformationJob

    parallelism: 1

    upgradeMode: stateless

    state: running

    savepointTriggerNonce: 2

  # ==========================================================
  # POD TEMPLATE
  # ==========================================================

  podTemplate:

    spec:

      containers:

        - name: flink-main-container

          env:

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v1

            - name: ENABLE_JOB
              value: "true"

            - name: OUTPUT_TOPIC
              value: "output-topic-v1"

          # --------------------------------------------------
          # MOUNT CHECKPOINT STORAGE
          # --------------------------------------------------

          volumeMounts:

            - name: flink-checkpoints-volume
              mountPath: /data/flink-checkpoints

      # ------------------------------------------------------
      # PVC VOLUME
      # ------------------------------------------------------

      volumes:

        - name: flink-checkpoints-volume

          persistentVolumeClaim:
            claimName: flink-checkpoints-pvc