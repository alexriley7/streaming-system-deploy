apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-transformation-v1
  namespace: flink
spec:
  image: ghcr.io/alexriley7/streaming-system/flink-transformation:da21e7c258711201324e74a72621309eeca0cd49
  flinkVersion: v1_18
  serviceAccount: default

  jobManager:
    resource:
      cpu: 1
      memory: "1024m"

  taskManager:
    resource:
      cpu: 1
      memory: "1024m"

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"

  job:
    jarURI: local:///opt/flink/usrlib/job.jar
    entryClass: com.example.FlinkTransformationJob   # 👈 ADD THIS
    parallelism: 1
    upgradeMode: stateless
    state: running

  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-consumer-v1