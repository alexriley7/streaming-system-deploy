apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment

metadata:
  name: flink-transformation-v2
  namespace: flink

spec:

  image: ghcr.io/alexriley7/streaming-system/flink-transformation:80fc3be09666945de8d79e8b29dc82d8c4911f31

  flinkVersion: v1_18

  serviceAccount: flink-sa



  # ==========================================================
  # JOB MANAGER
  # ==========================================================

  jobManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  # ==========================================================
  # TASK MANAGER
  # ==========================================================

  taskManager:
    resource:
      cpu: 0.25
      memory: "1024m"

  # ==========================================================
  # FLINK CONFIGURATION
  # ==========================================================

  flinkConfiguration:

    taskmanager.numberOfTaskSlots: "1"

    # --------------------------------------------------------
    # STATE BACKEND
    # --------------------------------------------------------

    state.backend: hashmap

    # --------------------------------------------------------
    # CHECKPOINTS / SAVEPOINTS
    # --------------------------------------------------------

    execution.checkpointing.interval: "30s"

    state.checkpoints.dir: file:///data/flink-checkpoints/checkpoints-debug-v2x

    state.savepoints.dir: file:///data/flink-savepoints/savepoints-debug-v2x

    state.checkpoints.num-retained: "5"



    taskmanager.numberOfTaskSlots: "1"

    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory

    metrics.reporter.prom.port: "9249"

    # --------------------------------------------------------
    # S3 / MOTO
    # --------------------------------------------------------

    s3.endpoint: http://moto-s3.default.svc.cluster.local:5000

    s3.path.style.access: "true"

    s3.access-key: test

    s3.secret-key: test

    s3.connection.ssl.enabled: "false"

  # ==========================================================
  # FLINK JOB
  # ==========================================================

  job:

    jarURI: local:///opt/flink/usrlib/job.jar

    entryClass: com.example.FlinkTransformationJob

    parallelism: 1

    upgradeMode: stateless

    state: running

    savepointTriggerNonce: 2

  # ==========================================================
  # POD TEMPLATE
  # ==========================================================

  podTemplate:

    spec:


      securityContext:

        fsGroup: 9999

      containers:

        - name: flink-main-container

          env:

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: GROUP_ID
              value: flink-debug-b1-v1

            - name: ENABLE_JOB
              value: "true"

            - name: OUTPUT_TOPIC
              value: "output-topic-debug-b1"


          ports:

            - containerPort: 9249
              name: metrics

          # --------------------------------------------------
          # MOUNT CHECKPOINT STORAGE##
          # --------------------------------------------------

          volumeMounts:

            - name: flink-checkpoints-volume
              mountPath: /data/flink-checkpoints

      # ------------------------------------------------------
      # PVC VOLUME
      # ------------------------------------------------------

      volumes:

        - name: flink-checkpoints-volume

          persistentVolumeClaim:
            claimName: flink-checkpoints-pvc-debug