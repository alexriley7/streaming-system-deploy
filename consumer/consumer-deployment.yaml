apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer
          image: ghcr.io/alexriley7/streaming-system/consumer:00a52c21dd2a67b7a6f653766b2bc105107e0c09
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: 172.17.0.1:9092
            - name: GROUP_ID
              value: "consumer-group-1"
      imagePullSecrets:
        - name: ghcr-secret
        