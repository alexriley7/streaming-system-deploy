apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-profile
spec:
  replicas: 1 #switch to 0 to stop producer
  selector:
    matchLabels:
      app: producer-profile
  template:
    metadata:
      labels:
        app: producer-profile
    spec:
      containers:
        - name: profile-producer
          image: ghcr.io/alexriley7/streaming-system/producer-profile:3f1889fe918588cd02e83b96916d52f192f03e51
          imagePullPolicy: Always

          # Added: 

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: ENABLE_PRODUCER
              value: "true"   # switch to "false" to stop producing

            - name: TOPIC
              value: profiles-input-topic-debug-a1


      imagePullSecrets:
        - name: ghcr-secret