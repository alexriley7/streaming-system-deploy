apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-profile
spec:
  replicas: 0 #switch to 0 to stop producer
  selector:
    matchLabels:
      app: producer-profile
  template:
    metadata:
      labels:
        app: producer-profile
    spec:
      containers:
        - name: profile-producer
          image: ghcr.io/alexriley7/streaming-system/producer-profile:606ef5d7d6f6b51900569bb15be0470ee2a76ca6
          imagePullPolicy: Always

          # Added: 

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

            - name: ENABLE_PRODUCER
              value: "false"   # switch to "false" to stop producing

            - name: TOPIC
              value: profile-input-topic


      imagePullSecrets:
        - name: ghcr-secret